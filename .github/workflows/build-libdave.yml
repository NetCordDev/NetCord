name: Build Libdave.RID

on:
  pull_request:
    branches:
      - stable
      - alpha
      - feature/e2ee-libdave
    paths:
      - 'NetCord/ThirdParty/Libdave/**'
      - '.github/workflows/build-libdave.yml'
  push:
    branches:
      - stable
      - alpha
      - feature/e2ee-libdave
    paths:
      - 'NetCord/ThirdParty/Libdave/**'
      - '.github/workflows/build-libdave.yml'
  workflow_dispatch:

jobs:
  build-libdave:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-2025-vs2026
            rid: win-x86
            arch: Win32
          - os: windows-2025-vs2026
            rid: win-x64
            arch: x64
          - os: windows-2025-vs2026
            rid: win-arm64
            arch: ARM64
          
          # Linux builds
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          
          # macOS builds
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest-large
            rid: osx-x64

    runs-on: ${{ matrix.os }}
    
    name: Build ${{ matrix.rid }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.1.0
        with:
          global-json-file: global.json

      - name: Install Linux cross-compilation tools (ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          
      - name: Restore dependencies
        run: dotnet restore NetCord/ThirdParty/Libdave/Libdave.RID/Libdave.RID.csproj -v diag -r ${{ matrix.rid }} /bl:restore-${{ matrix.rid }}.binlog

        # /p:Configurations="RelWithDebInfo,MinSizeRel"
      - name: Build & Pack Libdave.RID (via <GeneratePackageOnBuild>)
        shell: pwsh
        run: |
          if ("${{ matrix.arch }}" -ne "") { $env:CMAKE_GENERATOR_PLATFORM = "${{ matrix.arch }}" }
          if ("${{ matrix.os }}" -eq "ubuntu-latest" -and "${{ matrix.arch }}" -eq "arm64") {
            $env:CMAKE_CXX_COMPILER = "aarch64-linux-gnu-g++"
            $env:CMAKE_C_COMPILER = "aarch64-linux-gnu-gcc"
          }
          dotnet build NetCord/ThirdParty/Libdave/Libdave.RID/Libdave.RID.csproj  -v diag --no-restore -c MinSizeRel -r ${{ matrix.rid }} /bl:build-${{ matrix.rid }}.binlog
          
      - name: Upload Binary Log on Failure
        if: failure()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: BinLog-${{ matrix.rid }}
          path: |
            restore-${{ matrix.rid }}.binlog
            build-${{ matrix.rid }}.binlog
            
      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v6.0.0
        with:
          name: NuGet-Libdave-${{ matrix.rid }}
          path: NetCord/ThirdParty/Libdave/Libdave.RID/bin/MinSizeRel/*.nupkg
