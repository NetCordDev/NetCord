name: Build NetCord.Natives

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      GenerateBinLog:
        type: boolean
        default: false
      MSBuildVerbosity:
        type: choice
        description: 'MSBuild Verbosity Level'
        required: true
        default: 'Minimal'
        options:
          - Quiet
          - Minimal
          - Normal
          - Detailed
          - Diagnostic
  push:
    paths:
      - 'Natives/**'
      - '.github/workflows/build-natives.yml'

jobs:
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runs-on: windows-latest
            vcpkg-os-target: windows
            vcpkg-platform-target: x64
            use-nix: false
            shell_command: pwsh
          - rid: win-arm64
            runs-on: windows-11-arm
            vcpkg-os-target: windows
            vcpkg-platform-target: arm64
            use-nix: false
            shell_command: pwsh
          - rid: osx-x64
            runs-on: macos-15-intel
            vcpkg-os-target: osx
            vcpkg-platform-target: x64
            use-nix: true
            shell_command: nix develop .#natives -c bash -eo pipefail {0}
          - rid: osx-arm64
            runs-on: macos-15
            vcpkg-os-target: osx
            vcpkg-platform-target: arm64
            use-nix: true
            shell_command: nix develop .#natives -c bash -eo pipefail {0}
          - rid: linux-x64
            runs-on: ubuntu-latest
            vcpkg-os-target: linux
            vcpkg-platform-target: x64
            use-nix: true
            shell_command: nix develop .#natives -c bash -eo pipefail {0}
          - rid: linux-arm64
            runs-on: ubuntu-24.04-arm
            vcpkg-os-target: linux
            vcpkg-platform-target: arm64
            use-nix: true
            shell_command: nix develop .#natives -c bash -eo pipefail {0}
          - rid: linux-musl-x64
            runs-on: ubuntu-latest
            vcpkg-os-target: linux-musl
            vcpkg-platform-target: x64
            use-nix: true
            shell_command: nix develop .#natives-musl -c bash -eo pipefail {0}
          - rid: linux-musl-arm64
            runs-on: ubuntu-24.04-arm
            vcpkg-os-target: linux-musl
            vcpkg-platform-target: arm64
            use-nix: true
            shell_command: nix develop .#natives-musl --option max-jobs 2 --option cores 2 -c bash -eo pipefail {0}

    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: ${{ matrix.shell_command }}
    env:
      CI: true
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VcpkgOSTarget: ${{ matrix.vcpkg-os-target }}
      VcpkgPlatformTarget: ${{ matrix.vcpkg-platform-target }}
      Configuration: Release
      TargetRID: ${{ matrix.rid }}
      DotnetVerbose: ${{ github.event.inputs.MSBuildVerbosity || inputs.MSBuildVerbosity || 'Minimal' }}
      GenerateBinLog: ${{ github.event.inputs.GenerateBinLog || inputs.GenerateBinLog || false }}
      VCPKG_ROOT: ${{ github.workspace }}/Natives/NetCord.Natives/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          filter: tree:0
          submodules: true

      - name: Install Nix
        if: ${{ matrix.use-nix }}
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Magic Nix Cache
        if: ${{ matrix.use-nix }}
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Export GitHub Actions Vcpkg Cache Environment Variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg (Windows)
        if: ${{ !matrix.use-nix }}
        run: |
          $env:VCPKG_ROOT/bootstrap-vcpkg.bat

      - name: Setup vcpkg (Nix)
        if: ${{ matrix.use-nix }}
        run: |
          $VCPKG_ROOT/bootstrap-vcpkg.sh

      - name: Setup .NET Core SDK (Windows)
        if: ${{ !matrix.use-nix }}
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore
        run: >
          dotnet restore Natives/NetCord.Natives.slnx
          -v ${{ env.DotnetVerbose }}
          ${{ env.GenerateBinLog == 'true' && '-bl:restore.binlog' || '' }}

      - name: Build natives projects for ${{ matrix.rid }}
        id: build_step # Added an ID here to track this step's status
        run: >
          dotnet build Natives/NetCord.Natives.slnx --no-restore
          -v ${{ env.DotnetVerbose }}
          ${{ env.GenerateBinLog == 'true' && format('-bl:build.binlog -p:NativeAotBinLogPath={0}/nativeaotapptest.binlog', github.workspace) || '' }}
          -p:AppendNativeAotAppProps="RuntimeIdentifier=${{ env.TargetRID }}"
          -p:GeneratePackageOnBuild=false -p:CI=false
          ${{ matrix.vcpkg-os-target == 'osx' && '-p:InvariantGlobalization=true' || '' }}

      - name: Test natives outputs for ${{ matrix.rid }}
        run: >
          ${{ matrix.vcpkg-os-target == 'linux-musl' && 'docker run --rm -v $PWD:$PWD -w $PWD -e Configuration -e VCPKG_ROOT -e MINVERVERSIONOVERRIDE=1.0.0 mcr.microsoft.com/dotnet/sdk:10.0-alpine3.23-aot' || '' }}
          dotnet test Natives/NetCord.Natives.slnx
          --no-restore
          --no-build
          -v ${{ env.DotnetVerbose }}
          ${{ env.GenerateBinLog == 'true' && '-bl:test.binlog -p:NativeAotBinLogPath="$PWD/nativeaotapptest.binlog"' || '' }}
          --logger "console;verbosity=detailed"
          --logger GitHubActions
          ${{ matrix.vcpkg-os-target == 'osx' && '-p:InvariantGlobalization=true' || '' }}

      - name: Upload Binary Logs
        if: ${{ env.GenerateBinLog == 'true' && always()}}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.rid }}-build-binlogs
          path: |
            *.binlog

      - name: Clean Symbollic Links (Nix)
        if: ${{ matrix.use-nix }}
        run: |
          find Natives/NetCord.Natives/bin/${{ matrix.rid }}/natives/${{ matrix.vcpkg-platform-target }}-${{ matrix.vcpkg-os-target }}-dynamic/lib/ -type l -exec rm {} \;
          find Natives/NetCord.Natives/bin/${{ matrix.rid }}/natives-static/${{ matrix.vcpkg-platform-target }}-${{ matrix.vcpkg-os-target }}/lib/ -type l -exec rm {} \;

      - name: Upload Natives Artifact
        # This ensures we only upload if the Pack step actually finished successfully.
        if: ${{ always() && steps.pack_step.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NetCord.Natives.${{ matrix.rid }}.packages
          path: |
            Natives/NetCord.Natives/bin/${{ matrix.rid }}

  pack-natives:
    needs: [build-natives]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop .#natives -c bash -eo pipefail {0}
    env:
      Configuration: Release
      DotnetVerbose: ${{ github.event.inputs.MSBuildVerbosity || inputs.MSBuildVerbosity || 'Minimal' }}
      GenerateBinLog: ${{ github.event.inputs.GenerateBinLog || inputs.GenerateBinLog || false }}

    steps:
      - name: Download All Natives Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/natives-build
          pattern: NetCord.Natives.*.packages
          merge-multiple: true

      - name: Pack Natives NuGet Package
        id: pack_step # Added an ID here to track the pack status for the upload step
        run: >
          dotnet pack Natives/NetCord.Natives/NetCord.Natives.csproj --no-restore --no-build -v ${{ env.DotnetVerbose }}
          ${{ env.GenerateBinLog == 'true' && '-bl:pack.binlog' || '' }}
          -p:VcpkgArtifactsRoot=${{ github.workspace }}/artifacts/natives-build/
          -o ${{ github.workspace }}/

      - name: Upload Binary Logs
        if: ${{ env.GenerateBinLog == 'true' && always()}}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.rid }}-pack-binlogs
          path: |
            *.binlog

      - name: Upload NuGet Package Artifact
        # This ensures we only upload if the Pack step actually finished successfully.
        if: ${{ always() && steps.pack_step.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NetCord.Natives.packages
          path: |
            *.nupkg
            *.snupkg
