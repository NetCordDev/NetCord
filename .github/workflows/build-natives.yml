name: Build NetCord.Natives

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      GenerateBinLog:
        type: boolean
        default: false
  push:
    paths:
      - 'Natives/**'
      - '.github/workflows/build-natives.yml'

jobs:
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runs-on: windows-latest
            vcpkg-os-target: windows
            vcpkg-platform-target: x64
            use-nix: false
          - rid: win-arm64
            runs-on: windows-11-arm
            vcpkg-os-target: windows
            vcpkg-platform-target: arm64
            use-nix: false
          - rid: osx-x64
            runs-on: macos-15-intel
            vcpkg-os-target: osx
            vcpkg-platform-target: x64
            use-nix: true
          - rid: osx-arm64
            runs-on: macos-15
            vcpkg-os-target: osx
            vcpkg-platform-target: arm64
            use-nix: true
          - rid: linux-x64
            runs-on: ubuntu-latest
            vcpkg-os-target: linux
            vcpkg-platform-target: x64
            use-nix: true
          - rid: linux-arm64
            runs-on: ubuntu-24.04-arm
            vcpkg-os-target: linux
            vcpkg-platform-target: arm64
            use-nix: true

    runs-on: ${{ matrix.runs-on }}
    env:
      CI: true
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads
      VcpkgOSTarget: ${{ matrix.vcpkg-os-target }}
      VcpkgPlatformTarget: ${{ matrix.vcpkg-platform-target }}
      Configuration: Release
      RuntimeIdentifier: ${{ matrix.rid }}
      DotnetVerbose: minimal
      GenerateBinLog: ${{ github.event.inputs.GenerateBinLog || inputs.GenerateBinLog || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0
          submodules: true

      - name: Restore vcpkg cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .vcpkg-cache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('Natives/Natives/vcpkg.json', 'Natives/Natives/natives-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.rid }}-
            vcpkg-${{ runner.os }}-

      - name: Install Nix
        if: ${{ matrix.use-nix }}
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Setup .NET Core SDK (Windows)
        if: ${{ !matrix.use-nix }}
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Setup vcpkg (Windows)
        if: ${{ !matrix.use-nix }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:VCPKG_BINARY_SOURCES.Split(',')[1] -Force | Out-Null
          New-Item -ItemType Directory -Path $env:VCPKG_DOWNLOADS -Force | Out-Null
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE "Natives/Natives/vcpkg"
          Write-Host "Bootstrapping vcpkg from: $vcpkgRoot"
          & "$vcpkgRoot/bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup vcpkg (Nix)
        if: ${{ matrix.use-nix }}
        shell: nix develop .#natives -c bash -eo pipefail {0}
        run: |
          mkdir -p "${VCPKG_BINARY_SOURCES#*,}"
          mkdir -p "${VCPKG_DOWNLOADS}"

      - name: Restore
        shell: ${{ matrix.use-nix && 'nix develop .#natives -c bash -eo pipefail {0}' || 'pwsh' }}
        run: |
          dotnet restore Natives/NetCord.Natives.Tests/NetCord.Natives.Tests.csproj -v ${{ env.DotnetVerbose }} ${{ env.GenerateBinLog == 'true' && '-bl:restore.binlog' || '' }}

      - name: Build natives projects for ${{ matrix.rid }}
        shell: ${{ matrix.use-nix && 'nix develop .#natives -c bash -eo pipefail {0}' || 'pwsh' }}
        run: >
          dotnet build Natives/NetCord.Natives.Tests/NetCord.Natives.Tests.csproj --no-restore -v ${{ env.DotnetVerbose }} 
          ${{ env.GenerateBinLog == 'true' && '-bl:build.binlog' || '' }}
          -p:AppendNativeAotAppProps="RuntimeIdentifier=${{ env.RuntimeIdentifier }}" 
          -p:GeneratePackageOnBuild=false -p:CI=false

      - name: Test natives outputs for ${{ matrix.rid }}
        shell: ${{ matrix.use-nix && 'nix develop .#natives -c bash -eo pipefail {0}' || 'pwsh' }}
        run: >
          dotnet test Natives/NetCord.Natives.Tests/NetCord.Natives.Tests.csproj --no-restore --no-build -v ${{ env.DotnetVerbose }} 
          ${{ env.GenerateBinLog == 'true' && '-bl:test.binlog' || '' }}
          --logger "console;verbosity=detailed" 
          --logger GitHubActions 

      - name: Pack NuGet Package for ${{ matrix.rid }}
        if: ${{ always() }}
        shell: ${{ matrix.use-nix && 'nix develop .#natives -c bash -eo pipefail {0}' || 'pwsh' }}
        run: >
          dotnet pack Natives/Natives/NetCord.Natives.csproj --no-restore --no-build -v ${{ env.DotnetVerbose }} 
          ${{ env.GenerateBinLog == 'true' && '-bl:pack.binlog' || '' }}
          -o Natives/Natives/bin/${{ matrix.rid }} 
          -p:CI=false

      - name: Upload Binary Logs
        if: ${{ env.GenerateBinLog == 'true' && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.rid }}-binlogs
          path: |
            *.binlog

      - name: Upload NuGet Package Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NetCord.Natives.${{ matrix.rid }}.packages
          path: |
            Natives/Natives/bin/${{ matrix.rid }}/*.nupkg
            Natives/Natives/bin/${{ matrix.rid }}/*.snupkg

      - name: Save vcpkg cache
        if: ${{ always() }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .vcpkg-cache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('Natives/Natives/vcpkg.json', 'Natives/Natives/natives-ports/**') }}
